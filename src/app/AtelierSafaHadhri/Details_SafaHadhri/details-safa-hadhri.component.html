<div class="container mt-5 mb-5">
    <h1 class="text-center">Détails de l'Atelier</h1>
    <div class="card m-2" *ngIf="atelier">
        <div class="card-body">
            <p class="card-text"><strong>ID :</strong> {{ atelier.id }}</p>
            <h5 class="card-title">{{ atelier.nom }}</h5>
            <h6 class="card-subtitle mb-2 text-body-secondary">
                <span class="text-primary">{{ atelier.emailFormateur }}</span>
            </h6>
            <p class="card-text"><strong>Nombre de participants :</strong> {{ atelier.nbrParticipant }}</p>
            <p *ngIf="atelier.statut" class="badge text-bg-success">Actif</p>
            <p *ngIf="!atelier.statut" class="badge text-bg-danger">Inactif</p>
            <div class="mt-3">
                <a class="btn btn-warning text-white m-2" [routerLink]="['/atelierSafaHadhri/update/', atelier.id]"><i class="bi bi-pen"></i> Modifier</a>
                <a class="btn btn-danger text-white m-2" [routerLink]="['/atelierSafaHadhri/delete/', atelier.id]"><i class="bi bi-trash"></i> Supprimer</a>
            </div>
        </div>
    </div>

    <div *ngIf="!atelier">
        <h3 class="text-center"><i class="bi bi-x-octagon"></i> L'atelier avec l'identifiant {{ id }} n'existe pas ! <i class="bi bi-x-octagon"></i></h3>
    </div><br>
    <button (click)="returnToList()" class="btn btn-warning">
        <i class="bi bi-arrow-left-square"></i> Retourner vers la liste des ateliers
    </button>
</div>
