<div class="container mt-5 mb-5">
    <h1 class="text-center mb-3">Supprimer un Atelier</h1>
    <div class="card p-4">
        <div class="card-body text-center">
            <h5 class="card-title text-danger">
                <i class="bi bi-exclamation-triangle"></i> Confirmation de suppression
            </h5>
            <p class="card-text mt-3">Êtes-vous sûr de vouloir supprimer l'atelier <strong>{{ nom }}</strong> ?</p>
            <p class="text-muted">Cette action est irréversible.</p>
            <div class="mt-4">
                <button (click)="confirmDelete()" class="btn btn-danger m-2">
                    <i class="bi bi-trash"></i> Confirmer la suppression
                </button>
                <button (click)="cancel()" class="btn btn-secondary m-2">
                    <i class="bi bi-arrow-left"></i> Annuler
                </button>
            </div>
        </div>
    </div>
</div>
